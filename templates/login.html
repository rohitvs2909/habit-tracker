<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Habit Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="page-shell login-shell">
        <section class="dashboard-card login-card">
            <header class="hero">
                <h1>HABIT TRACKER</h1>
                <p>sign in to your shared dashboard</p>
            </header>

            <form class="login-form" action="{{ url_for('login') }}" method="post">
                {% if error %}
                <p class="login-error">{{ error }}</p>
                {% endif %}

                <label for="username">Username</label>
                <input id="username" name="username" type="text" required>

                <label for="password">Password</label>
                <input id="password" name="password" type="password" required>

                <button type="submit">Login</button>
                <a class="button-link" href="{{ url_for('register') }}">Create New Account</a>
            </form>

            <p class="login-note">New users can sign up with Create New Account.</p>
        </section>
    </main>
</body>
</html>
