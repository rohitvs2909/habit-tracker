<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | Habit Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="page-shell login-shell">
        <section class="dashboard-card login-card">
            <header class="hero">
                <h1>CHANGE PASSWORD</h1>
                <p>signed in as {{ username }}</p>
            </header>

            <form class="login-form" action="{{ url_for('change_password') }}" method="post">
                {% if error %}
                <p class="login-error">{{ error }}</p>
                {% endif %}

                {% if success %}
                <p class="login-success">{{ success }}</p>
                {% endif %}

                <label for="current_password">Current Password</label>
                <input id="current_password" name="current_password" type="password" required>

                <label for="new_password">New Password</label>
                <input id="new_password" name="new_password" type="password" required>

                <label for="confirm_password">Confirm New Password</label>
                <input id="confirm_password" name="confirm_password" type="password" required>

                <button type="submit">Update Password</button>
                <a class="button-link" href="{{ url_for('index') }}">Back to Dashboard</a>
            </form>
        </section>
    </main>
</body>
</html>
